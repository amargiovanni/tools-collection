<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0d9488" opacity="0.1"/>
  <circle cx="60" cy="60" r="56" stroke="#0d9488" stroke-width="2.5"/>

  <!-- Wrench -->
  <g transform="translate(60,60) rotate(-45) translate(-60,-60)">
    <path d="M44 52 L44 68 L52 76 L56 76 L56 72 L52 68 L52 52 Z" fill="#0d9488"/>
    <path d="M44 52 C44 42 52 34 62 34 C58 38 56 44 56 52 L52 52 Z" fill="#0d9488"/>
    <rect x="46" y="68" width="8" height="16" rx="1" fill="#0d9488"/>
  </g>

  <!-- Gear (right) -->
  <g transform="translate(72, 48)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#0f766e" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="#0f766e"/>
    <!-- Gear teeth -->
    <rect x="-2" y="-14" width="4" height="6" rx="1" fill="#0f766e"/>
    <rect x="-2" y="8" width="4" height="6" rx="1" fill="#0f766e"/>
    <rect x="-14" y="-2" width="6" height="4" rx="1" fill="#0f766e"/>
    <rect x="8" y="-2" width="6" height="4" rx="1" fill="#0f766e"/>
    <!-- Diagonal teeth -->
    <rect x="-2" y="-14" width="4" height="6" rx="1" fill="#0f766e" transform="rotate(45)"/>
    <rect x="-2" y="8" width="4" height="6" rx="1" fill="#0f766e" transform="rotate(45)"/>
    <rect x="-14" y="-2" width="6" height="4" rx="1" fill="#0f766e" transform="rotate(45)"/>
    <rect x="8" y="-2" width="6" height="4" rx="1" fill="#0f766e" transform="rotate(45)"/>
  </g>

  <!-- Code brackets < /> -->
  <g fill="none" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="38,78 28,88 38,98"/>
    <polyline points="82,78 92,88 82,98"/>
    <line x1="55" y1="76" x2="65" y2="100"/>
  </g>
</svg>
