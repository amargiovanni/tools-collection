<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Icon group -->
  <g transform="translate(16, 12)">
    <!-- Rounded square background -->
    <rect x="0" y="0" width="96" height="96" rx="22" fill="url(#grad1)" opacity="0.12"/>
    <rect x="0" y="0" width="96" height="96" rx="22" stroke="url(#grad1)" stroke-width="2"/>

    <!-- Terminal prompt -->
    <g stroke="url(#grad1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- > chevron -->
      <polyline points="24,36 40,48 24,60"/>
      <!-- cursor line -->
      <line x1="46" y1="60" x2="72" y2="60"/>
    </g>

    <!-- Three dots top-left (window chrome) -->
    <circle cx="22" cy="22" r="3.5" fill="#f87171"/>
    <circle cx="34" cy="22" r="3.5" fill="#fbbf24"/>
    <circle cx="46" cy="22" r="3.5" fill="#4ade80"/>
  </g>

  <!-- Text group -->
  <g transform="translate(132, 0)">
    <!-- "Tools" in bold gradient -->
    <text x="0" y="62" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#grad2)">
      Tools
    </text>
    <!-- "Collection" lighter -->
    <text x="0" y="96" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#64748b">
      Collection
    </text>
  </g>
</svg>
