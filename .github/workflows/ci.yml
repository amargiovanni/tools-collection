name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

      - name: Build
        run: npx astro build

      - name: Check for console.log in source
        run: |
          if grep -rn 'console\.log' src/ --include='*.ts' --include='*.tsx'; then
            echo "::error::console.log found in source code"
            exit 1
          fi

      - name: Verify page count
        run: |
          count=$(find dist -name '*.html' | wc -l)
          echo "Generated $count HTML pages"
          if [ "$count" -lt 141 ]; then
            echo "::error::Expected at least 141 pages, got $count"
            exit 1
          fi

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
